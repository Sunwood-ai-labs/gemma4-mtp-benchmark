name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Compile
        run: python -m compileall src
      - name: Doctor
        run: gemma4-mtp-bench doctor
      - name: Dry-run benchmark
        run: gemma4-mtp-bench run --model e2b --backend gpu --prompt-set quick --dry-run
